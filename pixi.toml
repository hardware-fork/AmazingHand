[workspace]
name = "amazinghand"
version = "0.1.0"
description = "Amazing Hand - Python examples and demos (Pollen Robotics)"
channels = ["conda-forge"]
# Ubuntu (x86_64), Windows (x64), Raspberry Pi (aarch64)
platforms = ["linux-64", "win-64", "linux-aarch64"]

[dependencies]
python = "3.12.*"

[pypi-dependencies]
numpy = ">=1.20"
rustypot = "*"
pytest = "*"
pre-commit = "*"

[tasks]
# PYTHONPATH= avoids loading system/ROS pytest plugins when run locally
test = "cd PythonExample && PYTHONPATH= python -m pytest tests/ -v"
